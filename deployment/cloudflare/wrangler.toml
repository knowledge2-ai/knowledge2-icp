name = "knowledge2-icp-gtm-dashboard"
main = "worker.js"
compatibility_date = "2026-06-12"
account_id = "replace-with-cloudflare-account-id"
workers_dev = false

assets = { directory = "../../icp_engine/web_assets", binding = "ASSETS" }

routes = [
  { pattern = "gtm-dev.knowledge2.ai", custom_domain = true }
]

[[kv_namespaces]]
binding = "ICP_STATE"
id = "cd071b0deaa54a72906e7dd13f0343d7"

[vars]
ICP_DEPLOYMENT_MODE = "seeded-worker"
K2_BASE_URL = "https://api-dev.knowledge2.ai"

[secrets]
required = ["K2_API_KEY", "APOLLO_API_KEY", "ICP_ADMIN_TOKEN"]
