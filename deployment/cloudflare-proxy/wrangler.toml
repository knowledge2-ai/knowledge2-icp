# Cloudflare Worker that fronts gtm-dev.knowledge2.ai with the private Cloud Run
# `gtm-demo` service. Deploy with `wrangler deploy` after setting the secrets
# below (see README.md). This replaced the seeded demo worker that used to live
# in deployment/cloudflare/ (retired in #46); it now owns the gtm-dev route.
name = "gtm-dev-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# No workers.dev URL. The Worker forwards the Cf-Access-Authenticated-User-Email
# header the engine trusts for SSO; that trust is only sound if the gated custom
# domain is the ONLY way in. A live workers.dev route would let anyone reach the
# Worker un-gated and forge that header, so it stays off.
workers_dev = false

# The public Cloud Run URL is the ID-token audience. Not a secret.
[vars]
CLOUD_RUN_URL = "https://gtm-demo-tpl2qqmb4a-uc.a.run.app"

# Own the hostname via a custom domain (not a bare route). A custom_domain
# binding makes Cloudflare reassign gtm-dev.knowledge2.ai from the old demo
# worker to this Worker and manage the DNS record + edge cert itself, so this
# proxy no longer rides on the retiring worker's DNS record. Pattern is the bare
# host (no /*); the zone is inferred. After this deploys and verifies, the old
# worker holds nothing and is safe to delete.
[[routes]]
pattern = "gtm-dev.knowledge2.ai"
custom_domain = true

# Secrets (NOT here — set via `wrangler secret put`, see README):
#   GCP_SA_EMAIL, GCP_SA_PRIVATE_KEY, GCP_SA_PRIVATE_KEY_ID
